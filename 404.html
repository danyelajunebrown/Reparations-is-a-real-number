<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reparations ∈ ℝ</title>
  <script>
    /**
     * GitHub Pages SPA redirect — canonical solution from spa-github-pages.
     *
     * GitHub Pages serves this file on any path that has no matching file.
     * We encode the current pathname + search + hash into a ?p= query string
     * and redirect to the app root. The restore script in index.html then
     * reads that param and calls history.replaceState so React Router sees
     * the correct URL before it initialises.
     *
     * segmentCount = 1  →  /Reparations-is-a-real-number  (one repo-name segment)
     *                       Change to 0 if you ever switch to a custom domain.
     */
    var segmentCount = 1;
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
    var path = l.pathname.slice(base.length) || '/';
    var qs   = l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '';
    var hsh  = l.hash   ? '&hash=' + encodeURIComponent(l.hash.slice(1)) : '';
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/?p=' + encodeURIComponent(path) + qs + hsh
    );
  </script>
</head>
<body></body>
</html>
