<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Queue — Reparations ∈ ℝ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root { --bg:#0b0f14; --card:#141a22; --border:#1f2937; --text:#d1d5db; --accent:#4ade80; --amber:#f5a623; --danger:#ef4444; --muted:#6b7280; }
  * { box-sizing: border-box; }
  body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family: ui-monospace, 'SF Mono', monospace; font-size:14px; }
  header { padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:1rem; }
  header h1 { margin:0; font-size:1.1rem; font-weight:600; letter-spacing:.05em; flex-shrink:0; }
  header .nav-links { display:flex; gap:1rem; font-size:12px; }
  header .nav-links a { color:var(--muted); text-decoration:none; }
  header .nav-links a:hover { color:var(--text); }
  main { display:grid; grid-template-columns: 280px 1fr; height: calc(100vh - 60px); }
  aside { border-right:1px solid var(--border); overflow-y:auto; padding:1rem 0; }
  aside h2 { padding:0 1rem; font-size:.75rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:.5rem; }
  .queue-btn { display:block; width:100%; padding:.75rem 1rem; background:transparent; border:none; color:var(--text); text-align:left; cursor:pointer; font-family:inherit; font-size:13px; border-left:3px solid transparent; }
  .queue-btn:hover { background:var(--card); }
  .queue-btn.active { background:var(--card); border-left-color:var(--accent); }
  .queue-btn.amber { }
  .queue-btn.amber.active { border-left-color:var(--amber); }
  .queue-btn .count { float:right; background:var(--border); padding:.1rem .5rem; border-radius:.25rem; font-size:11px; }
  .queue-btn .count.amber { background:rgba(245,166,35,0.2); color:var(--amber); }
  section#content { padding:1.5rem; overflow-y:auto; }
  .item { background:var(--card); border:1px solid var(--border); border-radius:.5rem; padding:1rem; margin-bottom:1rem; }
  .item.will-item { border-color: rgba(245,166,35,0.2); }
  .item h3 { margin:0 0 .3rem 0; font-size:1rem; color:#f0fdf4; }
  .item .sub { color:var(--muted); font-size:12px; margin-bottom:.5rem; }
  .item .detail { white-space:pre-wrap; font-size:13px; background:#0b0f14; padding:.75rem; border-radius:.25rem; margin:.5rem 0; max-height:200px; overflow-y:auto; }
  .item .evidence a { color:#60a5fa; text-decoration:none; font-size:12px; margin-right:.75rem; display:inline-block; margin-bottom:.25rem; }
  .item .evidence a:hover { text-decoration:underline; }
  .candidates { margin:.5rem 0; }
  .candidate-pill { display:inline-block; padding:.25rem .75rem; margin:.25rem .25rem .25rem 0; background:var(--border); border:1px solid #374151; border-radius:1rem; font-size:11px; cursor:pointer; }
  .candidate-pill.selected { background:var(--accent); color:#0b0f14; border-color:var(--accent); font-weight:600; }
  .candidate-pill.amber-pill { background:rgba(245,166,35,0.12); border-color:rgba(245,166,35,0.3); color:var(--amber); }
  .candidate-pill.amber-pill.selected { background:var(--amber); color:#0b0f14; border-color:var(--amber); }
  .actions { margin-top:.75rem; display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
  button.action { padding:.5rem 1rem; border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:.25rem; cursor:pointer; font-family:inherit; font-size:12px; }
  button.action.approve { background:#14532d; border-color:#166534; color:#d1fae5; }
  button.action.amber-approve { background:rgba(245,166,35,0.15); border-color:rgba(245,166,35,0.4); color:var(--amber); }
  button.action.reject { background:#7f1d1d; border-color:#991b1b; color:#fee2e2; }
  button.action.skip { color:var(--muted); }
  button.action:hover { filter:brightness(1.2); }
  button.action:disabled { opacity:.4; cursor:default; filter:none; }
  input.edit { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:.4rem .75rem; border-radius:.25rem; font-family:inherit; font-size:13px; width:100%; margin-bottom:.5rem; }
  #auth-modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index:100; }
  #auth-modal .box { background:var(--card); padding:2rem; border-radius:.5rem; border:1px solid var(--border); min-width:360px; }
  #auth-modal h2 { margin-top:0; }
  .toast { position:fixed; bottom:1rem; right:1rem; padding:.75rem 1.25rem; background:var(--accent); color:var(--bg); border-radius:.25rem; font-weight:600; opacity:0; transform:translateY(10px); transition:all .2s; z-index:200; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.error { background:var(--danger); color:white; }
  .empty { padding:3rem; text-align:center; color:var(--muted); }
  .badge-amber { display:inline-block; padding:.1rem .4rem; background:rgba(245,166,35,0.15); color:var(--amber); border-radius:.2rem; font-size:10px; margin-left:.4rem; vertical-align:middle; }
  .no-token-note { font-size:11px; color:var(--muted); margin-top:.4rem; }
  .will-meta { display:flex; gap:1.5rem; flex-wrap:wrap; margin:.4rem 0 .75rem 0; font-size:11px; color:var(--muted); }
  .will-meta span { display:inline-flex; align-items:center; gap:.3rem; }
  .will-candidates-label { font-size:11px; color:var(--muted); margin-bottom:.3rem; }
</style>
</head>
<body>

<div id="auth-modal">
  <div class="box">
    <h2>Admin token</h2>
    <p style="color:var(--muted); font-size:12px;">Enter your ADMIN_TOKEN to access gated queues. Leave blank to access public queues (Unlinked Wills) without a token.</p>
    <input id="auth-input" class="edit" type="password" placeholder="X-Admin-Token (optional for Will Review)">
    <div style="display:flex; gap:.75rem; margin-top:.5rem;">
      <button class="action approve" onclick="submitAuth()">Unlock with token</button>
      <button class="action" style="color:var(--amber); border-color:rgba(245,166,35,0.3);" onclick="skipAuth()">Skip — open Will Review only</button>
    </div>
  </div>
</div>

<header>
  <h1>▸ REVIEW QUEUE</h1>
  <div class="nav-links">
    <a href="/">← Home</a>
    <a href="/contribute/will">Submit Will</a>
  </div>
  <div style="font-size:12px; color:var(--muted);" id="reviewer-info">(no token)</div>
</header>

<main>
  <aside>
    <h2>Public Queues</h2>
    <div id="public-queue-list">
      <button class="queue-btn amber" data-name="unlinked_wills" onclick="selectUnlinkedWills()">
        Unlinked Wills
        <span class="count amber" id="unlinked-count">…</span>
      </button>
    </div>

    <h2 style="margin-top:1rem;">Admin Queues</h2>
    <div id="queue-list"><span style="padding:0 1rem; font-size:12px; color:var(--muted);">token required</span></div>
  </aside>
  <section id="content">
    <div class="empty">← pick a queue</div>
  </section>
</main>

<div id="toast" class="toast"></div>

<script>
let TOKEN = localStorage.getItem('adminToken');
let currentQueue = null;
let currentItems = [];

// ── Auth ──────────────────────────────────────────────────────────────────────
function submitAuth() {
  const v = document.getElementById('auth-input').value.trim();
  if (!v) { skipAuth(); return; }
  TOKEN = v;
  localStorage.setItem('adminToken', v);
  document.getElementById('auth-modal').style.display = 'none';
  document.getElementById('reviewer-info').textContent = '🔑 authenticated';
  loadAdminQueues();
  loadUnlinkedCount();
}

function skipAuth() {
  document.getElementById('auth-modal').style.display = 'none';
  document.getElementById('reviewer-info').textContent = '(public access)';
  loadUnlinkedCount();
}

// ── Generic API for admin routes ──────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch('/api/review' + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'X-Admin-Token': TOKEN || '',
      'X-Reviewer': 'admin',
      ...(opts.headers || {}),
    },
  });
  if (r.status === 401) {
    localStorage.removeItem('adminToken');
    document.getElementById('auth-modal').style.display = 'flex';
    throw new Error('Auth failed');
  }
  return r.json();
}

// ── Generic fetch for public will routes ──────────────────────────────────────
async function willApi(path, opts = {}) {
  const r = await fetch('/api/wills' + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', ...(opts.headers || {}) },
  });
  return r.json();
}

function toast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// ── Admin queue loader ────────────────────────────────────────────────────────
async function loadAdminQueues() {
  if (!TOKEN) return;
  try {
    const r = await api('/queues');
    const el = document.getElementById('queue-list');
    el.innerHTML = r.queues.map(q => `
      <button class="queue-btn" data-name="${q.name}" onclick="selectQueue('${q.name}')">
        ${q.title}
        <span class="count">${q.count}</span>
      </button>
    `).join('');
  } catch (e) { /* token invalid or admin routes down */ }
}

async function selectQueue(name) {
  currentQueue = name;
  document.querySelectorAll('.queue-btn').forEach(b => b.classList.toggle('active', b.dataset.name === name));
  const c = document.getElementById('content');
  c.innerHTML = '<div class="empty">loading…</div>';
  try {
    const r = await api(`/queue/${name}?limit=30`);
    currentItems = r.items;
    if (!r.items.length) { c.innerHTML = '<div class="empty">No items to review in this queue.</div>'; return; }
    c.innerHTML = r.items.map(renderItem).join('');
  } catch (e) { toast(e.message, true); }
}

// ── Unlinked Wills queue (public) ─────────────────────────────────────────────
async function loadUnlinkedCount() {
  try {
    const r = await willApi('/unlinked?limit=1');
    if (r.success) {
      document.getElementById('unlinked-count').textContent = r.total;
    }
  } catch (_) {}
}

async function selectUnlinkedWills() {
  currentQueue = 'unlinked_wills';
  document.querySelectorAll('.queue-btn').forEach(b => b.classList.toggle('active', b.dataset.name === 'unlinked_wills'));
  const c = document.getElementById('content');
  c.innerHTML = '<div class="empty">loading…</div>';
  try {
    const r = await willApi('/unlinked?limit=50');
    if (!r.success) throw new Error(r.error || 'fetch failed');
    if (!r.items.length) {
      c.innerHTML = '<div class="empty">✓ No unlinked wills — everything is filed.</div>';
      return;
    }
    c.innerHTML = `
      <div style="font-size:12px; color:var(--muted); margin-bottom:1rem;">
        ${r.total} unlinked will${r.total === 1 ? '' : 's'} — select the correct canonical person for each and click Link.
        No token required.
      </div>
      ${r.items.map(renderWillItem).join('')}
    `;
  } catch (e) { toast(e.message, true); c.innerHTML = `<div class="empty" style="color:var(--danger);">Error: ${e.message}</div>`; }
}

function renderWillItem(item) {
  const id = `will-${item.person_doc_id}`;

  // Build metadata line
  const metaParts = [];
  if (item.document_year) metaParts.push(`<span>📅 ${item.document_year}</span>`);
  if (item.location) metaParts.push(`<span>📍 ${escapeHtml(item.location)}</span>`);
  if (item.archiveSource) metaParts.push(`<span>🗄 ${escapeHtml(item.archiveSource)}</span>`);
  if (item.s3_key) metaParts.push(`<span style="color:var(--muted);">S3: ${escapeHtml(item.s3_key)}</span>`);

  // Candidate pills
  const pillHtml = (item.candidates || []).map(c => {
    const yearBits = [c.birth_year ? `b.${c.birth_year}` : null, c.death_year ? `d.${c.death_year}` : null].filter(Boolean);
    const locBits  = [c.primary_plantation, c.primary_county, c.primary_state].filter(Boolean);
    const label = [c.canonical_name, c.person_type, ...yearBits, ...locBits.join(', ')].filter(Boolean).join(' · ');
    return `<span class="candidate-pill amber-pill" 
      onclick="selectWillCandidate('${id}', ${c.id}, '${escapeAttr(c.canonical_name)}')" 
      data-cp="${c.id}" 
      title="id=${c.id}">${escapeHtml(label)}</span>`;
  }).join('');

  const s3Url = item.s3_url || '';
  const pdfLink = s3Url ? `<a href="${escapeHtml(s3Url)}" target="_blank" rel="noopener" style="color:#60a5fa; font-size:12px;">📄 View PDF</a>` : '';

  return `<div class="item will-item" id="${id}" data-pdid="${item.person_doc_id}" data-extid="${item.extraction_id || ''}">
    <h3>${escapeHtml(item.title || item.name_as_appears || '(untitled)')}<span class="badge-amber">unlinked</span></h3>
    <div class="sub">Testator: <strong>${escapeHtml(item.name_as_appears || '—')}</strong> · person_doc id=${item.person_doc_id}</div>
    <div class="will-meta">${metaParts.join('')}</div>
    ${pdfLink ? `<div class="evidence" style="margin-bottom:.5rem;">${pdfLink}</div>` : ''}
    ${pillHtml ? `
      <div class="candidates">
        <div class="will-candidates-label">Candidate canonical persons — click to select:</div>
        ${pillHtml}
      </div>
    ` : '<div style="font-size:11px; color:var(--muted); margin:.4rem 0;">No candidates found in canonical_persons — this name may need to be added first.</div>'}
    <div class="actions">
      <button class="action amber-approve" 
        id="link-btn-${item.person_doc_id}"
        onclick="linkWill('${id}', ${item.person_doc_id}, '${item.extraction_id || ''}')" 
        disabled>
        ✓ Link to selected
      </button>
      <span id="link-sel-label-${item.person_doc_id}" style="font-size:11px; color:var(--muted);">no person selected</span>
      <button class="action skip" onclick="removeWillItem('${id}')">skip for now</button>
    </div>
    <div id="link-err-${item.person_doc_id}" style="color:var(--danger); font-size:11px; margin-top:.3rem; display:none;"></div>
  </div>`;
}

function selectWillCandidate(itemId, cpId, cpName) {
  const scope = document.getElementById(itemId);
  const pdId  = scope.dataset.pdid;
  scope.querySelectorAll('.candidate-pill').forEach(p => {
    p.classList.toggle('selected', p.dataset.cp == cpId);
  });
  // Store selection on the item element
  scope.dataset.selectedCp   = cpId;
  scope.dataset.selectedName = cpName;
  // Enable the link button and update label
  const btn = document.getElementById(`link-btn-${pdId}`);
  const lbl = document.getElementById(`link-sel-label-${pdId}`);
  if (btn) btn.disabled = false;
  if (lbl) lbl.textContent = `→ ${cpName} (id=${cpId})`;
}

async function linkWill(itemId, pdId, extId) {
  const scope = document.getElementById(itemId);
  const cpId = scope.dataset.selectedCp;
  if (!cpId) return;

  const btn = document.getElementById(`link-btn-${pdId}`);
  const err = document.getElementById(`link-err-${pdId}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Linking…'; }

  try {
    const body = JSON.stringify({
      personDocId: pdId,
      canonicalPersonId: cpId,
      extractionId: extId || undefined,
    });
    const r = await willApi('/link', { method: 'POST', body });
    if (!r.success) throw new Error(r.error || 'link failed');
    toast(`✓ Linked to ${r.linkedTo?.canonical_name || 'person id=' + cpId}`);
    removeWillItem(itemId);
    // Refresh count
    loadUnlinkedCount();
  } catch (e) {
    if (err) { err.textContent = '✗ ' + e.message; err.style.display = 'block'; }
    if (btn) { btn.disabled = false; btn.textContent = '✓ Link to selected'; }
    toast(e.message, true);
  }
}

function removeWillItem(id) {
  const el = document.getElementById(id);
  if (el) { el.style.opacity = '.3'; el.style.pointerEvents = 'none'; setTimeout(() => el.remove(), 300); }
}

// ── Admin review item renderer (unchanged from original) ──────────────────────
function renderItem(item) {
  const id = `item-${item.id}`;
  const evs = (item.evidence_urls || []).map(u => `<a href="${u}" target="_blank">${u.split('/').pop() || u}</a>`).join('');
  const cands = (item.candidate_canonicals || []).map(c =>
    `<span class="candidate-pill" onclick="selectCandidate('${id}', ${c.id})" data-cp="${c.id}">cp=${c.id}${c.canonical_name ? ' "'+c.canonical_name+'"' : ''}${c.primary_state ? ' ['+c.primary_state+']' : ''}</span>`
  ).join('');

  const depositors = (item.depositor_names || []).slice(0, 5).map(n => `<span style="color:var(--muted); font-size:11px; margin-right:.5rem;">◈ ${n}</span>`).join('');

  return `<div class="item" id="${id}" data-kind="${item.kind}" data-id="${item.id}">
    <h3>${escapeHtml(item.title)}</h3>
    <div class="sub">${escapeHtml(item.subtitle || '')}</div>
    ${item.detail ? `<div class="detail">${escapeHtml(item.detail)}</div>` : ''}
    ${depositors ? `<div class="evidence">${depositors}</div>` : ''}
    ${evs ? `<div class="evidence">${evs}</div>` : ''}
    ${cands ? `<div class="candidates">Candidate canonicals (click to select): ${cands}</div>` : ''}
    ${renderActions(item)}
  </div>`;
}

function renderActions(item) {
  switch (item.kind) {
    case 'enslaver_candidate':
      return `<input class="edit" placeholder="(optional) edit name before creating new canonical" id="edit-${item.id}">
        <div class="actions">
          <button class="action approve" onclick="approveEnslaverCandidate('${item.id}')">✓ Approve</button>
          <button class="action reject" onclick="rejectEnslaverCandidate('${item.id}')">✗ Reject</button>
          <button class="action skip" onclick="skip('${item.id}')">skip</button>
        </div>`;
    case 'unresolved_petition':
      return `<input class="edit" placeholder="(optional) edit claimant name to create new canonical" id="edit-${item.id}">
        <div class="actions">
          <button class="action approve" onclick="approvePetition('${item.id}')">✓ Link to selected</button>
          <button class="action skip" onclick="skip('${item.id}')">skip</button>
        </div>`;
    case 'climb_match':
      return `<div class="actions">
          <button class="action approve" onclick="approveClimbMatch('${item.id}', 'confirmed_slaveholder')">✓ Confirmed slaveholder</button>
          <button class="action approve" onclick="approveClimbMatch('${item.id}', 'enslaved_ancestor')">✓ Enslaved ancestor</button>
          <button class="action reject" onclick="rejectClimbMatch('${item.id}')">✗ Reject</button>
          <button class="action skip" onclick="skip('${item.id}')">skip</button>
        </div>`;
    case 'ambiguous_unconfirmed':
      return `<input class="edit" placeholder="(optional) edit name" id="edit-${item.id}">
        <div class="actions">
          <button class="action approve" onclick="approveAmbiguous('${item.id}', 'enslaved')">✓ Enslaved person</button>
          <button class="action approve" onclick="approveAmbiguous('${item.id}', 'enslaver')">✓ Enslaver</button>
          <button class="action approve" onclick="approveAmbiguous('${item.id}', 'freedperson')">✓ Freedperson</button>
          <button class="action reject" onclick="rejectAmbiguous('${item.id}')">✗ Not a person</button>
          <button class="action skip" onclick="skip('${item.id}')">skip</button>
        </div>`;
    case 'parse_failure':
      return renderParseFailureActions(item);
    case 'dedup_pair': {
      const a = item.person_a || {}, b = item.person_b || {};
      const card = (p) => `<div style="flex:1; border:1px solid var(--border,#333); border-radius:6px; padding:.5rem;">
          <b>cp=${p.id}</b> "${escapeHtml(p.name || '')}"<br>
          <span style="color:var(--muted); font-size:11px;">${p.birth || '?'}–${p.death || '?'} · ${escapeHtml(p.state || '—')} · ${escapeHtml(p.type || '')} · ${p.docs || 0} docs</span></div>`;
      const evChips = (item.evidence || []).map(e => `<span class="candidate-pill">${escapeHtml(e)}</span>`).join(' ');
      const sv = item.suggested_survivor, vi = item.suggested_victim;
      return `<div style="display:flex; gap:.75rem; margin:.5rem 0;">${card(a)}${card(b)}</div>
        ${evChips ? `<div class="evidence">${evChips}</div>` : ''}
        <div class="actions">
          <button class="action approve" onclick="mergeDedup('${item.id}', ${sv}, ${vi})">⇄ Merge — keep cp=${sv}</button>
          <button class="action approve" onclick="mergeDedup('${item.id}', ${vi}, ${sv})">⇄ Merge — keep cp=${vi}</button>
          <button class="action reject" onclick="distinctDedup('${item.id}')">✗ Distinct people</button>
          <button class="action skip" onclick="skipDedup('${item.id}')">skip</button>
        </div>`;
    }
    case 'xsrc_enslaver': {
      const cp = item.canonical || {}, ld = item.lead || {};
      const card = (label, name, sub) => `<div style="flex:1; border:1px solid var(--border,#333); border-radius:6px; padding:.5rem;">
          <span style="color:var(--muted); font-size:10px;">${label}</span><br><b>${escapeHtml(name || '')}</b><br>
          <span style="color:var(--muted); font-size:11px;">${escapeHtml(sub || '')}</span></div>`;
      const evChips = (item.evidence || []).map(e => `<span class="candidate-pill">${escapeHtml(e)}</span>`).join(' ');
      return `<div style="display:flex; gap:.75rem; margin:.5rem 0;">
          ${card('unconfirmed lead #' + ld.id, ld.name, `${ld.location || ''} · ${ld.source || ''}`)}
          ${card('canonical cp=' + cp.id, cp.name, `${cp.state || ''} ${cp.county || ''} · ${cp.docs || 0} docs`)}
        </div>
        ${evChips ? `<div class="evidence">${evChips}</div>` : ''}
        <div class="actions">
          <button class="action approve" onclick="linkXsrc('${item.id}', ${cp.id}, ${ld.id})">⛓ Link lead → cp=${cp.id}</button>
          <button class="action reject" onclick="distinctXsrc('${item.id}')">✗ Different person</button>
          <button class="action skip" onclick="skipXsrc('${item.id}')">skip</button>
        </div>`;
    }
    case 'duplicate_cluster':
      return `<div class="actions"><button class="action skip" onclick="skip('${item.id}')">dismiss (use merge script for now)</button></div>`;
    default: return '';
  }
}

// 31 Freedmens schema fields the reviewer may fill.
const FREEDMENS_FIELDS = [
  'account_number','date_of_entry','depositor_name','birthplace','where_brought_up',
  'age','residence','complexion','occupation','employer',
  'marital_status','spouse_name','spouse_residence','father_name','mother_name',
  'siblings_names','children_names','family_residences','spouse_father','spouse_mother','spouse_siblings',
  'last_master','last_mistress','plantation','slave_residence','old_title',
  'union_lines','post_emancipation','signature','further_facts','remarks',
];

function renderParseFailureActions(item) {
  const existing = item.extracted_fields || {};
  const inputs = FREEDMENS_FIELDS.map(f =>
    `<div style="display:flex; gap:.5rem; align-items:center; margin-bottom:.25rem;">
       <label style="width:180px; font-size:11px; color:var(--muted);">${f}</label>
       <input class="edit" id="pf-${item.id}-${f}" placeholder="(empty)" value="${escapeHtml(existing[f] || '')}" style="flex:1; margin-bottom:0;">
     </div>`
  ).join('');
  return `<details style="margin-top:.5rem;">
    <summary style="cursor:pointer; color:var(--accent); font-size:12px;">▸ Fill fields manually (${FREEDMENS_FIELDS.length})</summary>
    <div style="margin-top:.5rem;">${inputs}</div>
  </details>
  <div class="actions">
    <label style="font-size:11px; display:inline-flex; align-items:center; gap:.3rem;">
      <input type="checkbox" id="pf-${item.id}-training" checked> use as training data
    </label>
    <button class="action approve" onclick="submitParseFailure('${item.id}')">✓ Save corrections</button>
    <button class="action reject" onclick="markUnreviewable('${item.id}')">✗ Unreviewable</button>
    <button class="action skip" onclick="skip('${item.id}')">skip</button>
  </div>`;
}

async function submitParseFailure(id) {
  const fields = {};
  for (const f of FREEDMENS_FIELDS) {
    const v = document.getElementById(`pf-${id}-${f}`)?.value?.trim();
    if (v) fields[f] = v;
  }
  const markTraining = document.getElementById(`pf-${id}-training`)?.checked;
  try {
    await api(`/parse_failures/${id}/submit`, { method: 'POST',
      body: JSON.stringify({ reviewer_fields: fields, mark_training_eligible: markTraining }) });
    toast(`✓ Saved ${Object.keys(fields).length} fields`);
    removeItem(id);
  } catch (e) { toast(e.message, true); }
}

async function markUnreviewable(id) {
  const reason = prompt('Why is this unreviewable?', 'page_damaged');
  if (!reason) return;
  try { await api(`/parse_failures/${id}/unreviewable`, { method: 'POST', body: JSON.stringify({ reason }) });
    toast('✗ marked unreviewable'); removeItem(id); } catch (e) { toast(e.message, true); }
}

function selectCandidate(itemId, cpId) {
  const scope = document.getElementById(itemId);
  scope.querySelectorAll('.candidate-pill').forEach(p => p.classList.toggle('selected', p.dataset.cp == cpId));
}

function getSelectedCp(id) {
  const scope = document.getElementById(`item-${id}`);
  const sel = scope.querySelector('.candidate-pill.selected');
  return sel ? parseInt(sel.dataset.cp) : null;
}

function getEdit(id) { return document.getElementById(`edit-${id}`)?.value?.trim() || null; }

async function approveEnslaverCandidate(id) {
  try {
    const r = await api(`/enslaver_candidates/${id}/approve`, { method: 'POST', body: JSON.stringify({ winner_canonical_id: getSelectedCp(id), edit_name: getEdit(id) }) });
    toast(`✓ Approved → cp=${r.canonical_id}, ${r.edges_added} edges added`);
    removeItem(id);
  } catch (e) { toast(e.message, true); }
}

async function rejectEnslaverCandidate(id) {
  const reason = prompt('Reject reason?', 'ocr_noise'); if (!reason) return;
  try { await api(`/enslaver_candidates/${id}/reject`, { method: 'POST', body: JSON.stringify({ reason }) }); toast('✗ rejected'); removeItem(id); } catch (e) { toast(e.message, true); }
}

async function approvePetition(id) {
  try {
    const r = await api(`/unresolved_petitions/${id}/approve`, { method: 'POST', body: JSON.stringify({ winner_canonical_id: getSelectedCp(id), edit_claimant: getEdit(id) }) });
    toast(`✓ linked to cp=${r.canonical_id}`); removeItem(id);
  } catch (e) { toast(e.message, true); }
}

async function approveClimbMatch(id, classification) {
  try { await api(`/pending_climb_matches/${id}/approve`, { method: 'POST', body: JSON.stringify({ classification }) }); toast(`✓ ${classification}`); removeItem(id); } catch (e) { toast(e.message, true); }
}
async function rejectClimbMatch(id) {
  const reason = prompt('Reason?', 'false positive'); if (!reason) return;
  try { await api(`/pending_climb_matches/${id}/reject`, { method: 'POST', body: JSON.stringify({ reason }) }); toast('✗ rejected'); removeItem(id); } catch (e) { toast(e.message, true); }
}

async function approveAmbiguous(id, target_type) {
  try { await api(`/ambiguous_unconfirmed/${id}/approve`, { method: 'POST', body: JSON.stringify({ target_type, edit_name: getEdit(id) }) }); toast(`✓ ${target_type}`); removeItem(id); } catch (e) { toast(e.message, true); }
}
async function rejectAmbiguous(id) {
  try { await api(`/ambiguous_unconfirmed/${id}/reject`, { method: 'POST', body: JSON.stringify({ reason: 'not_a_person' }) }); toast('✗ not-a-person'); removeItem(id); } catch (e) { toast(e.message, true); }
}
async function mergeDedup(id, survivor, victim) {
  if (!confirm(`Merge cp=${victim} INTO cp=${survivor}?\n\nThis folds all of cp=${victim}'s records into cp=${survivor} (FK-safe, logged), then marks cp=${victim} as merged. Not trivially reversible.`)) return;
  try {
    await api(`/duplicate_canonicals/${id}/merge`, { method: 'POST', body: JSON.stringify({ survivor_id: survivor, victim_id: victim }) });
    toast(`✓ merged cp=${victim} → cp=${survivor}`); removeItem(id);
  } catch (e) { toast(e.message, true); }
}
async function distinctDedup(id) {
  try { await api(`/duplicate_canonicals/${id}/distinct`, { method: 'POST', body: JSON.stringify({ reason: '' }) }); toast('✓ marked distinct'); removeItem(id); }
  catch (e) { toast(e.message, true); }
}
async function skipDedup(id) {
  try { await api(`/duplicate_canonicals/${id}/skip`, { method: 'POST' }); } catch (e) { /* local skip anyway */ }
  removeItem(id);
}

async function linkXsrc(id, canonicalId, leadId) {
  try {
    await api(`/cross_source_enslavers/${id}/link`, { method: 'POST', body: JSON.stringify({}) });
    toast(`⛓ linked lead #${leadId} → cp=${canonicalId}`); removeItem(id);
  } catch (e) { toast(e.message, true); }
}
async function distinctXsrc(id) {
  try { await api(`/cross_source_enslavers/${id}/distinct`, { method: 'POST', body: JSON.stringify({ reason: '' }) }); toast('✓ marked distinct'); removeItem(id); }
  catch (e) { toast(e.message, true); }
}
async function skipXsrc(id) {
  try { await api(`/cross_source_enslavers/${id}/skip`, { method: 'POST' }); } catch (e) { /* local skip */ }
  removeItem(id);
}

function skip(id) { removeItem(id); }

function removeItem(id) {
  const el = document.getElementById(`item-${id}`);
  if (el) { el.style.opacity = '.3'; el.style.pointerEvents = 'none'; setTimeout(() => el.remove(), 300); }
}

function escapeHtml(s) { return (s ?? '').toString().replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return (s ?? '').toString().replace(/'/g, "\\'"); }

// ── Bootstrap ─────────────────────────────────────────────────────────────────
// Always load the unlinked wills count (public, no token needed).
// If a token is stored, skip the auth modal and load admin queues too.
loadUnlinkedCount();

if (TOKEN) {
  document.getElementById('auth-modal').style.display = 'none';
  document.getElementById('reviewer-info').textContent = '🔑 authenticated';
  loadAdminQueues();
} else {
  // Check if the user came from a will upload (URL param auto-opens the queue)
  const params = new URLSearchParams(location.search);
  if (params.get('queue') === 'wills') {
    document.getElementById('auth-modal').style.display = 'none';
    document.getElementById('reviewer-info').textContent = '(public access)';
    selectUnlinkedWills();
  }
}
</script>
